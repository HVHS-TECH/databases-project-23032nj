<head>

    <script> authenticateLogin()</script>

<!--****************************
Body 
********************************-->

<body>

    <div class="containerOne">
        <div class="contentOne">
            <h1 class="headerstyle"> Registration </h1>
            

            <div class="userDetailsForm">
                <h2>Please fill out the form</h2>

                <form id="userDetailsForm">
                    <label class="formLabel" for="name"> Username:</label>
                    <input  class="formInput" type="text" id="name" name="name" required />

                    <label class="formLabel" for="age"> Age: </label>
                    <input class="formInput" type="number" id="age" name="age" min="10" max="80" required />
                </form>

                <div class="submitButtonContainer">
                    <button onclick="submitUserDetailsForm()">Submit </button>
                </div>                
                
            </div>
            
        </div>
    </div>

    <script src="js/user_signup.js"></script>

</body>
